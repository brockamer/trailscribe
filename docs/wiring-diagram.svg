<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
  xmlns="http://www.w3.org/2000/svg"
  width="800"
  height="400"
  viewBox="0 0 800 400"
  font-family="sans-serif">
  <!-- inReach device -->
  <rect x="20" y="160" width="140" height="60" fill="#f0f8ff" stroke="#003366"/>
  <text x="90" y="195" font-size="14" text-anchor="middle" fill="#003366">inReach Device</text>

  <!-- Garmin Gateway -->
  <rect x="200" y="160" width="140" height="60" fill="#eef8f0" stroke="#006400"/>
  <text x="270" y="195" font-size="14" text-anchor="middle" fill="#006400">Garmin Gateway</text>

  <!-- Webhook / Orchestrator -->
  <rect x="380" y="120" width="180" height="140" fill="#fff8e1" stroke="#d4a017"/>
  <text x="470" y="150" font-size="14" text-anchor="middle" fill="#d4a017">TrailScribe Webhook</text>
  <text x="470" y="170" font-size="12" text-anchor="middle" fill="#d4a017">Parser &amp; Orchestrator</text>
  <text x="470" y="190" font-size="12" text-anchor="middle" fill="#d4a017">Idempotency &amp; Ledger</text>

  <!-- Tools -->
  <rect x="600" y="80" width="160" height="60" fill="#e8f4fc" stroke="#004c99"/>
  <text x="680" y="110" font-size="12" text-anchor="middle" fill="#004c99">OpenAI / Gmail /</text>
  <text x="680" y="125" font-size="12" text-anchor="middle" fill="#004c99">Todoist / Posthaven</text>

  <rect x="600" y="240" width="160" height="60" fill="#e8f4fc" stroke="#004c99"/>
  <text x="680" y="270" font-size="12" text-anchor="middle" fill="#004c99">Context (Location &amp; Weather)</text>

  <!-- Arrows -->
  <!-- Device to Gateway -->
  <line x1="160" y1="190" x2="200" y2="190" stroke="#003366" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Gateway to Webhook -->
  <line x1="340" y1="190" x2="380" y2="190" stroke="#006400" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Webhook to Tools (top) -->
  <line x1="560" y1="140" x2="600" y2="110" stroke="#d4a017" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Webhook to Tools (bottom) -->
  <line x1="560" y1="220" x2="600" y2="270" stroke="#d4a017" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Webhook reply back to Gateway/Device via Email -->
  <line x1="560" y1="190" x2="600" y2="190" stroke="#d4a017" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="600" y1="190" x2="340" y2="190" stroke="#d4a017" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Arrow definition -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5"
        markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="currentColor" />
    </marker>
  </defs>
</svg>