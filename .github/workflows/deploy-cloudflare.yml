name: Deploy (Cloudflare Workers)

on:
  push:
    branches:
      - main
      - "staging/**"
  workflow_dispatch:
    inputs:
      target:
        description: "Deploy target"
        required: true
        default: production
        type: choice
        options:
          - staging
          - production

# Required repo secrets (Settings > Secrets and variables > Actions):
#   CF_API_TOKEN   - Cloudflare API token with "Edit Workers" permission
#                    (create at https://dash.cloudflare.com/profile/api-tokens
#                    using the "Edit Cloudflare Workers" template)
#   CF_ACCOUNT_ID  - Cloudflare account ID from dashboard URL or `wrangler whoami`

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy-staging:
    if: startsWith(github.ref, 'refs/heads/staging/') || (github.event_name == 'workflow_dispatch' && inputs.target == 'staging')
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - name: Deploy to Workers (staging)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: deploy --env staging

  deploy-production:
    if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && inputs.target == 'production')
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - name: Deploy to Workers (production)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: deploy --env production
