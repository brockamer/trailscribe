name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install
        working-directory: ./trailscribe

      - name: Build TypeScript
        run: pnpm run build --if-present
        working-directory: ./trailscribe

      - name: Lint
        run: pnpm run lint --if-present
        working-directory: ./trailscribe

      - name: Run tests
        run: pnpm test
        working-directory: ./trailscribe